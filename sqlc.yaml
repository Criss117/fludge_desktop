version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/shared/db/queries.sql"
    schema: "internal/shared/db/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/shared/db"
        emit_json_tags: true
        overrides:
          - db_type: "blob"
            go_type: "encoding/json.RawMessage"
